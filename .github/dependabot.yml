version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
    groups:
      npm-major:
        update-types:
          - major
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # Keeps the GitHub Actions used in .github/workflows/ up to date.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    groups:
      actions:
        update-types:
          - major
          - minor
          - patch
